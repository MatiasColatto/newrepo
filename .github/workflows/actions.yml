name: Quality Pipeline

on:
  push:
    branches:
      - main

  pull_request:


jobs:
  quality:

    runs-on: ubuntu-latest


    steps:

      # =========================
      # Descargar código
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      # =========================
      # Java 21
      # =========================
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin


      # =========================
      # Maven Wrapper
      # =========================
      - name: Give permission to mvnw
        run: chmod +x spring-petclinic/mvnw


      # =========================
      # Levantar Spring Boot
      # equivalente a:
      # start cmd /k mvnw spring-boot:run
      # =========================
      - name: Start Spring Petclinic
        run: |
          cd spring-petclinic

          nohup ./mvnw spring-boot:run \
          > spring.log 2>&1 &


      # =========================
      # Esperar API
      # equivalente al loop del BAT
      # =========================
      - name: Wait for Spring Boot
        run: |

          echo "Esperando Spring Boot..."

          until curl -s http://localhost:8080 > /dev/null
          do
            echo "Servidor no listo..."
            sleep 5
          done

          echo "Spring Boot listo"


      # =========================
      # Semgrep CI
      # =========================
      - name: Run Semgrep CI
        run: |
          semgrep ci \
          --config p/java \
          --exclude target \
          --exclude .git


      # =========================
      # k6
      # =========================
      - name: Setup k6
        uses: grafana/setup-k6-action@v1


      - name: Run k6 load test
        run: |

          mkdir -p k6-env/results

          k6 run \
          --out json=k6-env/results/resultado.json \
          k6-env/pet_clinic_test.js


      # =========================
      # Reporte k6
      # =========================
      - name: Generate k6 report
        run: |
          python k6-env/generar_reporte.py


      # =========================
      # SonarQube Server
      # =========================
      - name: SonarQube Analysis
        run: |
          cd spring-petclinic

          ./mvnw sonar:sonar \
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}
